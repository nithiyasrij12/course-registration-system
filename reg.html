<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Students Course Register Form</h2>
    <label>Student ID</label>
    <input id="studentId" type="number">
    <label>Course ID</label>
    <input id="courseId" type="number">
    <button type="submit" onclick="enroll()">Enroll</button>
    <p id="msg"></p>
    <script>
    const api = "http://localhost:8080/api/enrollments";

    function enroll() {
        const studentId = document.getElementById("studentId").value;
        const courseId = document.getElementById("courseId").value;

     fetch(`${api}?studentId=${studentId}&courseId=${courseId}`, {
        method: "POST"
    })
        .then(res => res.json())
        .then(() => {
            document.getElementById("msg").innerText = "✅ Student Enrolled Successfully";
    })
    .catch(err => {
        console.error(err);
        document.getElementById("msg").innerText = "❌ Error enrolling student";
    });
}
</script>
</body>
</html>
